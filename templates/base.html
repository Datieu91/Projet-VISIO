<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WDP SaaS · GreenBin{% endblock %}</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQkFQXbTsbcI+O4Drt/rXAzLbhv32bk=" crossorigin="">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="app-shell">
  <aside class="sidebar">
    <a class="brand" href="{{ url_for('agent_app') }}">
      <span class="brand-mark">◎</span>
      <span>
        <strong>WDP SaaS</strong>
        <small>Agent territorial</small>
      </span>
    </a>

    <nav class="side-nav">
      <a class="{{ 'active' if active == 'citoyen' else '' }}" href="{{ url_for('citoyen_app') }}">
        <span>📸</span> Signalement
      </a>
      <a class="{{ 'active' if active == 'agent' else '' }}" href="{{ url_for('agent_app') }}">
        <span>🖼️</span> Modération
      </a>
      <a class="{{ 'active' if active == 'dashboard' else '' }}" href="{{ url_for('dashboard_app') }}">
        <span>📊</span> Dashboard
      </a>
    </nav>

    <div class="agent-card">
      <span class="avatar">●</span>
      <strong>Agent WDP</strong>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  {% block scripts %}{% endblock %}
</body>
</html>
